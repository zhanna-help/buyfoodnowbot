name: BuyFoodNow

on:

  schedule:

    - cron: "0 7 * * *"

  workflow_dispatch:

jobs:

  remind:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5

        with:

          python-version: "3.11"

      - run: pip install requests

      - run: python bot.py

        env:

          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}

          CHAT_ID: ${{ secrets.CHAT_ID }}
